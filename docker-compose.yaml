version: '3'
services:
  db_postgres_main:
    build: ./db-postgres
    image: otus-hw/db-postgres
    shm_size: 2g
    # volumes:
    #   - "$HOME/otus/volumes/pg_main:/var/lib/postgresql/data:rw"
  db_redis:
    image: redis
  app_sidekiq:
    build: ./app
    image: otus-hw/app_sidekiq
    command: "bundle exec sidekiq -C 'config/sidekiq.yaml' -v -r './initialize.rb'"
    depends_on:
      - db_redis
      - app
  app:
    build: ./app
    image: otus-hw/app
    command: "bundle exec puma -p 3000 -t 1:4 -w 16"
    depends_on:
      - db_postgres_main
    environment:
      RACK_ENV: development
  web:
    build: ./nginx
    image: otus-hw/nginx
    depends_on:
      - app
    ports:
      - 8080:80
  # db_postgres_replica_1:
  #   build: ./db-postgres
  #   image: otus-hw/db-postgres
  #   shm_size: 2g
  #   volumes:
  #     - "$HOME/otus/volumes/pg_replica_1:/var/lib/postgresql/data:rw"
  # db_postgres_replica_2:
  #   build: ./db-postgres
  #   image: otus-hw/db-postgres
  #   shm_size: 2g
  #   volumes:
  #     - "$HOME/otus/volumes/pg_replica_2:/var/lib/postgresql/data:rw"

  citus_master:
    build: ./citus-master
    image: otus-hw/citus-master
    container_name: "${COMPOSE_PROJECT_NAME:-citus}_master"
    ports: ["${COORDINATOR_EXTERNAL_PORT:-5432}:5432"]
    labels: ["com.citusdata.role=Master"]
    environment: &AUTH
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PGUSER: "${POSTGRES_USER:-postgres}"
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_HOST_AUTH_METHOD: "${POSTGRES_HOST_AUTH_METHOD:-trust}"
      CITUS_HOST: citus_master
  citus_worker:
    image: "citusdata/citus:12.1.3"
    labels: ["com.citusdata.role=Worker"]
    depends_on: [citus_manager]
    environment: *AUTH
    command: "/wait-for-manager.sh"
    volumes:
      - healthcheck-volume:/healthcheck
  citus_manager:
    container_name: "${COMPOSE_PROJECT_NAME:-citus}_manager"
    image: "citusdata/membership-manager:0.3.0"
    restart: on-failure
    volumes:
      - "${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock"
      - healthcheck-volume:/healthcheck
    depends_on: [citus_master]
    environment: *AUTH
volumes:
  healthcheck-volume: